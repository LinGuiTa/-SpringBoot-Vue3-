server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: price-radar
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/price_radar?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root1234
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  redis:
    host: localhost
    port: 6379
    database: 0
    password:
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
  cache:
    type: redis
    redis:
      time-to-live: 1800000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: t_
      logic-delete-field: status
      logic-delete-value: 0
      logic-not-delete-value: 1
  mapper-locations: classpath*:mapper/**/*.xml

jwt:
  secret: PriceRadar2024SecretKeyForJWTTokenGenerationMustBe256BitsLong
  expiration: 7200
  refresh-expiration: 604800

logging:
  level:
    com.priceradar: DEBUG
    org.springframework.security: INFO
  file:
    name: logs/price-radar.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
